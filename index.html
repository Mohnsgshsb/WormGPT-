<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Cairo', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #1a0000, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 350px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(20, 0, 0, 0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(255,0,0,0.4);
  text-align: center;
}

h2 {
  color: #ff1a1a;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: #0d0d0d;
  color: white;
  transition: 0.3s;
}

input:focus {
  outline: none;
  box-shadow: 0 0 10px red;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, red, darkred);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px red;
}

.error {
  color: #ff4d4d;
  font-size: 14px;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>تسجيل الدخول</h2>

  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>

  <div class="error" id="error">❌ بيانات غير صحيحة</div>
</div>

<script>

// قاعدة البيانات (تعدل فيها براحتك)
const users = [
  {
    username: "admin",
    password: "1234",
    code: "VIP001",
    expire: "2026-04-01"
  },
  {
    username: "mohamed",
    password: "5678",
    code: "VIP002",
    expire: "2026-03-25"
  }
];

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;
  let today = new Date().toISOString().split('T')[0];

  let found = users.find(u => u.username === user && u.password === pass);

  if (!found) {
    document.getElementById("error").innerText = "❌ بيانات غلط";
    document.getElementById("error").style.display = "block";
    return;
  }

  // تحقق من الاشتراك
  if (today > found.expire) {
    document.getElementById("error").innerText = "⛔ الاشتراك انتهى";
    document.getElementById("error").style.display = "block";
    return;
  }

  // حفظ تسجيل الدخول
  localStorage.setItem("user", user);

  // تحويل
  window.location.href = "./gp.html";
}

</script>

</body>
</html>
